name: Build Server Image

on:
  workflow_dispatch:
    inputs:
      ref:
        required: true
        default: 'main'
        description: 'The git ref to run the workflow on'
      tag:
        description: Extra image tag to publish.
        required: false
        default: manual
      push_latest:
        description: Also publish the latest tag.
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: build-server-image
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: s8fy-server
  CRESCENT_REV: feature/patch

jobs:
  build-image:
    name: Build and Push GHCR Image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: source
          token: ${{ secrets.ACCESS_TOKEN }}
          ref: ${{ github.event.inputs.ref }}
          repository: ${{ secrets.SOURCE_REPO }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          check-latest: true
          package-manager-cache: false

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          check-latest: true
          github-token: ${{ github.token }}

      - name: Resolve tool and image metadata
        id: meta
        shell: nu {0}
        working-directory: source
        run: |
          let owner = 'hustcer'
          let image = $"($env.REGISTRY)/($owner)/($env.IMAGE_NAME)"
          let sha_tag = $"sha-($env.GITHUB_SHA | str substring 0..<12)"
          let ref_tag = (
            $env.GITHUB_REF_NAME? | default "manual" | str replace --all "/" "-" | str downcase
          )
          let push_latest = "${{ github.event_name == 'push' || inputs.push_latest }}"
          let extra_tag = ("${{ inputs.tag || '' }}" | str replace --all "/" "-" | str downcase)

          let base_tags = [ $"($image):($sha_tag)" $"($image):($ref_tag)" ]
          let tags_with_latest = if $push_latest == "true" {
            $base_tags | append $"($image):latest"
          } else {
            $base_tags
          }
          let tags = if ($extra_tag | str length) > 0 {
            $tags_with_latest | append $"($image):($extra_tag)" | uniq
          } else {
            $tags_with_latest | uniq
          }

          let output = ( [ $"image=($image)" "tags<<EOF" ...$tags "EOF" ] | str join "\n" )
          $"($output)\n" | save --append $env.GITHUB_OUTPUT

          print "Publishing tags:"
          $tags | each {|tag| print $"  ($tag)" }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: hustcer
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: source
          platforms: linux/amd64
          file: source/docker/s8fy-server.Dockerfile
          build-args: |
            CRESCENT_REV=${{ env.CRESCENT_REV }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Native s8fy HTTP server
          cache-from: type=gha
          cache-to: type=gha,mode=max
