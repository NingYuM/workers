name: Build Server Image

on:
  workflow_dispatch:
    inputs:
      ref:
        required: true
        default: 'main'
        description: 'The git ref to run the workflow on'
      tag:
        description: Extra image tag to publish.
        required: false
        default: manual
      push_latest:
        description: Also publish the latest tag.
        required: false
        type: boolean
        default: true
      customer_id:
        description: Customer identifier embedded in the image.
        required: false
        default: ci
      license_id:
        description: License identifier embedded in the image.
        required: false
        default: lic_ci
      build_id:
        description: Build identifier embedded in the image.
        required: false
        default: ''
      edition:
        description: Edition embedded in the image.
        required: false
        default: ci
      expires_at:
        description: Optional license expiry timestamp.
        required: false
        default: ''
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: build-server-image
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: s8fy-server
  CRESCENT_REV: feature/patch
  SOURCE_REF: ${{ github.event.inputs.ref || 'main' }}

jobs:
  metadata:
    name: Resolve Image Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tags: ${{ steps.meta.outputs.tags }}
      primary_tag: ${{ steps.meta.outputs.primary_tag }}
      source_sha: ${{ steps.meta.outputs.source_sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          path: source
          token: ${{ secrets.ACCESS_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          repository: ${{ secrets.SOURCE_REPO }}

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          check-latest: true

      - name: Resolve tool and image metadata
        id: meta
        shell: nu {0}
        working-directory: source
        run: |
          let owner = 'hustcer'
          let image = $"($env.REGISTRY)/($owner)/($env.IMAGE_NAME)"
          let source_sha = (^git rev-parse HEAD | str trim)
          let sha_tag = $"sha-($source_sha | str substring 0..<12)"
          let ref_tag = (
            $env.SOURCE_REF
            | str replace --all "/" "-"
            | str downcase
          )
          let push_latest = "${{ github.event_name == 'push' || github.event.inputs.push_latest == 'true' }}"
          let extra_tag = (
            "${{ github.event.inputs.tag || '' }}"
            | str replace --all "/" "-"
            | str downcase
          )

          let base_tags = [
            $"($image):($sha_tag)"
            $"($image):($ref_tag)"
          ]
          let tags_with_latest = if $push_latest == "true" {
            $base_tags | append $"($image):latest"
          } else {
            $base_tags
          }
          let tags = if ($extra_tag | str length) > 0 {
            $tags_with_latest | append $"($image):($extra_tag)" | uniq
          } else {
            $tags_with_latest | uniq
          }

          let output = (
            [
              $"image=($image)"
              $"primary_tag=($tags | first)"
              $"source_sha=($source_sha)"
              "tags<<EOF"
              ...$tags
              "EOF"
            ] | str join "\n"
          )
          $"($output)\n" | save --append $env.GITHUB_OUTPUT

          print "Publishing tags:"
          for tag in $tags {
            print $"  ($tag)"
          }

  build:
    name: Build ${{ matrix.platform }}
    needs: metadata
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact: digests-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact: digests-arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          path: source
          token: ${{ secrets.ACCESS_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          repository: ${{ secrets.SOURCE_REPO }}

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          check-latest: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: hustcer
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Build and push digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: source
          file: source/docker/s8fy-server.Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            CRESCENT_REV=${{ env.CRESCENT_REV }}
            S8FY_CUSTOMER_ID=${{ github.event.inputs.customer_id || 'ci' }}
            S8FY_LICENSE_ID=${{ github.event.inputs.license_id || 'lic_ci' }}
            S8FY_BUILD_ID=${{ github.event.inputs.build_id || format('build_{0}', needs.metadata.outputs.source_sha) }}
            S8FY_EDITION=${{ github.event.inputs.edition || 'ci' }}
            S8FY_EXPIRES_AT=${{ github.event.inputs.expires_at || '' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ secrets.SOURCE_REPO }}
            org.opencontainers.image.revision=${{ needs.metadata.outputs.source_sha }}
            org.opencontainers.image.description=Native s8fy HTTP server
          outputs: type=image,name=${{ needs.metadata.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=s8fy-server-${{ matrix.artifact }}
          cache-to: type=gha,mode=max,scope=s8fy-server-${{ matrix.artifact }}

      - name: Export digest
        shell: nu {0}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          DIGEST_DIR: ${{ runner.temp }}/digests
        run: |
          mkdir $env.DIGEST_DIR
          let digest = ($env.DIGEST | str replace "sha256:" "")
          "" | save --force ($env.DIGEST_DIR | path join $digest)

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create Multi-Arch Manifest
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          path: source
          token: ${{ secrets.ACCESS_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          repository: ${{ secrets.SOURCE_REPO }}

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          check-latest: true

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: hustcer
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Create and push manifest
        shell: nu {0}
        env:
          IMAGE: ${{ needs.metadata.outputs.image }}
          TAGS: ${{ needs.metadata.outputs.tags }}
          DIGEST_DIR: ${{ runner.temp }}/digests
        run: |
          let tag_args = (
            $env.TAGS
            | lines
            | where {|tag| ($tag | str trim) != "" }
            | each {|tag| ["--tag" $tag] }
            | flatten
          )
          let digest_args = (
            ls $env.DIGEST_DIR
            | get name
            | each {|path| $"($env.IMAGE)@sha256:($path | path basename)" }
          )

          print "Creating manifest for:"
          for digest in $digest_args {
            print $"  ($digest)"
          }

          ^docker buildx imagetools create ...$tag_args ...$digest_args

      - name: Generate delivery record and SBOM summary
        shell: nu {0}
        working-directory: source
        env:
          IMAGE: ${{ needs.metadata.outputs.image }}
          PRIMARY_TAG: ${{ needs.metadata.outputs.primary_tag }}
          TAGS: ${{ needs.metadata.outputs.tags }}
          DIGEST_DIR: ${{ runner.temp }}/digests
          CRESCENT_REV: ${{ env.CRESCENT_REV }}
          SOURCE_REPO: ${{ secrets.SOURCE_REPO }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
          S8FY_CUSTOMER_ID: ${{ github.event.inputs.customer_id || 'ci' }}
          S8FY_LICENSE_ID: ${{ github.event.inputs.license_id || 'lic_ci' }}
          S8FY_BUILD_ID: ${{ github.event.inputs.build_id || format('build_{0}', needs.metadata.outputs.source_sha) }}
          S8FY_EDITION: ${{ github.event.inputs.edition || 'ci' }}
          S8FY_EXPIRES_AT: ${{ github.event.inputs.expires_at || '' }}
        run: |
          let inspect = (^docker buildx imagetools inspect $env.PRIMARY_TAG)
          let image_digest = (
            $inspect
            | lines
            | where {|line| ($line | str trim) =~ '^Digest:' }
            | first
            | split row ":"
            | skip 1
            | str join ":"
            | str trim
          )
          let platform_digests = (
            ls $env.DIGEST_DIR
            | get name
            | each {|path| $"unknown=sha256:($path | path basename)" }
            | str join "\n"
          )
          $env.IMAGE_DIGEST = $image_digest
          $env.PLATFORM_DIGESTS = $platform_digests
          nu tools/generate-s8fy-delivery-record.nu \
            --repository $env.SOURCE_REPO \
            --revision $env.SOURCE_SHA \
            --ref-name $env.SOURCE_REF

      - name: Upload delivery record
        uses: actions/upload-artifact@v7
        with:
          name: s8fy-delivery-record
          path: |
            source/s8fy-delivery-record.json
            source/s8fy-image-sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
